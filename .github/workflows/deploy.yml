name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # wallpaper = the Vite React app (3-scene astronomy) -> /sandbox/wallpaper/
      - name: Build wallpaper (Vite)
        run: cd wallpaper && npm ci && npm run build

      # assemble the multi-section hub: home at /sandbox/ + wallpaper sub-path
      - name: Assemble _site
        run: |
          mkdir -p _site
          cp home/index.html _site/index.html
          cp -r wallpaper/dist _site/wallpaper
          # (blog -> _site/blog and rainbow -> _site/rainbow added later, #29/#30)

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
