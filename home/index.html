<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>sandbox — dohyun-jose-kim</title>
<meta name="description" content="A sunset sandbox of web experiments. Drag the toys, pick a corner to play.">
<style>
  :root{
    /* ---- sunset (day) palette ---- */
    --sky-0:#ff4d2e; --sky-1:#ff7a3d; --sky-2:#ffa969; --sky-3:#ffd2a0;
    --sun:#fff1cf;
    --sand-top:#ffe1a6; --sand-2:#f6c476; --sand-3:#e2a458; --sand-sh:#c5853f;
    --wood-oak:#d98a4e; --wood-l:#e8b07a; --wood-m:#c0764a; --wood-d:#9c5a30; --wood-edge:#7a3413;
    --pink:#ff3d8b; --pink-d:#c41e63; --pink-x:#8c1146;
    --teal:#1fc6c6; --teal-d:#0d8d8d;
    --cream:#fff4e8; --ink:#5d2a14; --muted:#b06a2e;
    --contact:#7a3413;
    /* ---- avatar themeable fills (day defaults; .night overrides below) ---- */
    --av-hoodie:#ffcf4d; --av-torso:#f3ece0; --av-hair:#5a3a22;
    --av-pants:#2b3d63; --av-shoe:#ffffff; --av-skin:#f4d9c0; --av-cheek:#ff9a8a; --av-eye:#3a2a1e;  /* --av-pants = cap navy */
    --font:"SF Pro Rounded", ui-rounded, "Quicksand", "Hiragino Maru Gothic Pro", system-ui, -apple-system, sans-serif;
  }
  /* ---- night palette (toggle) ---- */
  .sb-stage.night{
    --sky-0:#10162e; --sky-1:#1d2547; --sky-2:#2c3460; --sky-3:#46406e;
    --sun:#cdd6ff;
    --av-hoodie:#e0b53e; --av-torso:#cfc8bd; --av-hair:#4a2f1c; --av-pants:#1c2a44;
    --av-shoe:#e8e8ee; --av-skin:#e4cab2; --av-cheek:#d97a6e; --av-eye:#2e2016;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  .sb-stage{
    position:relative; width:100%; min-height:100svh; overflow:hidden;
    font-family:var(--font); color:var(--cream); touch-action:manipulation;
    background:
      radial-gradient(120% 90% at 62% 8%, var(--sun) 0%, rgba(255,241,207,0) 42%),
      linear-gradient(178deg, var(--sky-0) 0%, var(--sky-1) 34%, var(--sky-2) 64%, var(--sky-3) 100%);
    -webkit-font-smoothing:antialiased; isolation:isolate;
    transition:background .8s ease;
  }
  .sb-sun{
    position:absolute; top:6%; left:62%; width:190px; height:190px; transform:translate(-50%,0);
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%, var(--sun) 0%, #ffe9b0 38%, rgba(255,224,150,0) 70%);
    filter:blur(2px); z-index:0; pointer-events:none;
    animation:sb-sun 9s ease-in-out infinite;
  }
  .night .sb-sun{ background:radial-gradient(circle at 50% 50%, #f3f6ff 0%, #c7d2ff 40%, rgba(180,195,255,0) 72%); }
  .night .sb-diorama{ filter:brightness(.9) saturate(.95); }  /* gently cool the warm props to harmonize with the night sky */
  @keyframes sb-sun{50%{opacity:.78; transform:translate(-50%,4px) scale(1.04)}}

  /* stars — night only */
  .sb-stars{position:absolute; inset:0; z-index:0; pointer-events:none; opacity:0; transition:opacity .8s ease}
  .night .sb-stars{opacity:1}
  .sb-star{position:absolute; width:3px; height:3px; border-radius:50%; background:#fff;
    box-shadow:0 0 6px #cdd6ff; animation:sb-twinkle 3s ease-in-out infinite}

  .sb-motes{position:absolute; inset:0; z-index:1; pointer-events:none}
  .sb-mote{position:absolute; width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle,var(--sun),rgba(255,247,223,0)); opacity:.55;
    animation:sb-mote 14s linear infinite}
  @keyframes sb-mote{
    0%{transform:translateY(20px) translateX(0); opacity:0}
    12%{opacity:.6} 88%{opacity:.5}
    100%{transform:translateY(-120px) translateX(26px); opacity:0}
  }

  /* ---- top bar ---- */
  .sb-eyebrow{
    position:absolute; top:26px; left:30px; z-index:6;
    font-size:13px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:#fff; text-shadow:0 1px 3px rgba(110,38,12,.7), 0 0 2px rgba(110,38,12,.6);
  }
  .sb-eyebrow b{opacity:.82; font-weight:600}
  .sb-topright{position:absolute; top:22px; right:24px; z-index:6; display:flex; align-items:center; gap:10px}
  .sb-pill{
    display:flex; align-items:center; gap:7px;
    padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:#fff;
    background:rgba(122,52,19,.42); backdrop-filter:blur(3px);
    box-shadow:inset 0 0 0 1px rgba(255,244,232,.25);
  }
  .night .sb-pill{background:rgba(10,16,40,.5)}
  .sb-dot{width:8px; height:8px; border-radius:50%; background:#8fff7a; box-shadow:0 0 8px #8fff7a; animation:sb-blink 2.4s ease-in-out infinite}
  @keyframes sb-blink{50%{opacity:.4}}
  .sb-toggle{
    cursor:pointer; border:none; width:38px; height:38px; border-radius:50%; font-size:18px; line-height:1;
    color:#fff; background:rgba(122,52,19,.42); backdrop-filter:blur(3px);
    box-shadow:inset 0 0 0 1px rgba(255,244,232,.25); transition:transform .3s, background .4s;
  }
  .sb-toggle:hover{transform:scale(1.08) rotate(-12deg)}
  .night .sb-toggle{background:rgba(10,16,40,.5)}

  /* ---- scene ---- */
  .sb-scene{
    position:relative; z-index:2; width:100%; min-height:100svh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:54px 12px 36px;
  }
  .sb-diorama-wrap{ width:min(97vw, 1280px); perspective:1300px; }
  .sb-diorama{
    width:100%; height:auto; display:block; overflow:visible;
    transition:transform .25s ease-out; will-change:transform;
    animation:sb-enter 1s cubic-bezier(.2,.8,.25,1) backwards;  /* backwards (not both): don't keep filling transform → parallax inline transform applies after entry */
  }
  @keyframes sb-enter{from{opacity:0; transform:translateY(26px) scale(.96)} to{opacity:1; transform:none}}

  /* ---- props (bookshelf / desk = nav) ---- */
  .sb-item, .sb-sub{cursor:pointer; outline:none}
  .sb-item-pos{touch-action:none}        /* the container is the drag surface; claim the gesture so touch-drag isn't stolen */
  .sb-item .lift, .sb-sub .lift{ transition:transform .42s cubic-bezier(.2,.9,.2,1); transform-box:fill-box; transform-origin:50% 100% }
  .sb-item:hover .lift, .sb-item:focus-visible .lift,
  .sb-sub:hover .lift, .sb-sub:focus-visible .lift{ transform:translateY(-16px) scale(1.03) }
  .sb-item .propshadow, .sb-item .propshadow{ transition:transform .42s ease, opacity .42s ease; transform-box:fill-box; transform-origin:50% 50% }
  .sb-item:hover .propshadow, .sb-item:focus-visible .propshadow{ transform:scale(1.18); opacity:.16 }

  /* entry drop + idle bob for toys */
  .sb-item .drop{ animation:sb-drop .9s cubic-bezier(.34,1.56,.5,1) both; animation-delay:calc(.55s + var(--i,0)*.13s) }
  @keyframes sb-drop{from{transform:translateY(-130px); opacity:0} 60%{opacity:1} to{transform:translateY(0)}}
  .sb-item .bob{ animation:sb-bob 4.4s ease-in-out infinite; animation-delay:calc(var(--i,0)*.55s) }
  @keyframes sb-bob{50%{transform:translateY(-5px)}}
  /* while dragging: kill idle bob, lift & enlarge shadow, no transition on the moving group */
  .sb-item.dragging .bob{ animation:none }
  .sb-item.dragging .lift, .sb-sub.dragging .lift{ transition:none; transform:translateY(-14px) scale(1.08) }
  .sb-item.dragging .propshadow{ transition:none; transform:scale(1.4); opacity:.12 }
  .sb-item-pos{ will-change:transform }

  /* hover signposts */
  .sb-tag{
    transition:transform .32s cubic-bezier(.2,.9,.2,1), opacity .3s;
    transform-box:fill-box; transform-origin:50% 100%; opacity:0;
    filter:drop-shadow(0 3px 5px rgba(120,50,10,.32)); pointer-events:none;
  }
  .sb-item:hover .sb-tag, .sb-item:focus-visible .sb-tag,
  .sb-sub:hover .sb-tag, .sb-sub:focus-visible .sb-tag{ transform:translateY(-6px) scale(1.04); opacity:1 }
  .sb-tag-bg{fill:var(--cream)}
  .sb-tag-tx{font-weight:800; letter-spacing:.02em; font-size:16px; fill:var(--ink); font-family:var(--font)}
  .sb-tag-soon{font-weight:700; font-size:13px; letter-spacing:.04em; fill:var(--muted); font-family:var(--font)}
  .sb-tag-arrow{fill:var(--pink); font-weight:900}
  /* soon-reject feedback: pops the signpost up (so it's visible even on touch where there's no hover) and jiggles it */
  .sb-tag.sb-shake{animation:sb-shake .55s ease}
  @keyframes sb-shake{
    0%{opacity:1; transform:translateY(-6px) scale(1.04)}
    25%{opacity:1; transform:translateY(-6px) scale(1.04) translateX(-5px)}
    75%{opacity:1; transform:translateY(-6px) scale(1.04) translateX(5px)}
    100%{opacity:1; transform:translateY(-6px) scale(1.04)}
  }

  /* sand divots (drag trail) */
  .sb-divot{pointer-events:none; animation:sb-divot 4.5s ease-out forwards}
  @keyframes sb-divot{from{opacity:.85} to{opacity:0}}

  .ring{opacity:0; transition:opacity .2s}
  .sb-item:focus-visible .ring, .sb-sub:focus-visible .ring{ opacity:1 }

  .sb-star{transform-box:fill-box; transform-origin:50% 50%}
  @keyframes sb-twinkle{0%,100%{transform:scale(.5); opacity:.25} 50%{transform:scale(1); opacity:1}}

  /* ---- wordmark ---- */
  .sb-wordmark{
    margin:6px 0 0; position:relative; z-index:3; font-family:var(--font);
    font-weight:900; font-size:clamp(44px, 9.5vw, 104px); line-height:.9;
    letter-spacing:-.01em; color:var(--pink); text-transform:uppercase; text-align:center;
    transform:skewX(-3deg);
    text-shadow:
      1px 1px 0 var(--pink-d), 2px 2px 0 var(--pink-d), 3px 3px 0 var(--pink-d),
      4px 5px 0 var(--pink-x), 5px 6px 0 var(--pink-x), 6px 7px 0 var(--pink-x),
      7px 8px 0 var(--pink-x), 8px 10px 0 var(--pink-x),
      0 16px 26px rgba(120,20,60,.42);
    animation:sb-pop 1s cubic-bezier(.2,.9,.25,1.2) .35s both;
  }
  @keyframes sb-pop{from{opacity:0; transform:skewX(-3deg) translateY(30px) scale(.9)} to{opacity:1; transform:skewX(-3deg) translateY(0) scale(1)}}
  .sb-tagline{
    margin:16px 0 0; z-index:3; text-align:center; max-width:40ch;
    font-size:clamp(14px,1.7vw,17px); font-weight:600; line-height:1.5;
    color:#fff; text-shadow:0 1px 4px rgba(90,42,20,.85), 0 0 3px rgba(90,42,20,.6);
    animation:sb-fade 1s ease .8s both;
  }
  .sb-tagline .ko{display:block; margin-top:4px; font-size:.86em; opacity:.82; font-weight:500}
  @keyframes sb-fade{from{opacity:0; transform:translateY(10px)} to{opacity:1}}

  @media (max-width:640px){
    .sb-eyebrow{font-size:10.5px; letter-spacing:.07em; top:18px; left:16px}
    .sb-topright{top:14px; right:12px; gap:7px}
    .sb-pill{font-size:10px; padding:5px 9px}
    .sb-toggle{width:32px; height:32px; font-size:15px}
    .sb-scene{padding-top:46px}
  }
  /* short / landscape viewports: don't center+clip — top-align and allow scroll so the wordmark survives */
  @media (max-height:560px){
    .sb-stage{overflow-y:auto}
    .sb-scene{justify-content:flex-start; min-height:auto; padding-top:58px; padding-bottom:28px}
  }
  @media (prefers-reduced-motion: reduce){
    .sb-sun,.sb-mote,.sb-dot,.sb-star,.sb-diorama,.sb-wordmark,.sb-tagline,
    .sb-item .drop,.sb-item .bob,.sb-tag.sb-shake{animation:none}
    .sb-diorama{transition:none}
    .sb-wordmark{transform:skewX(-3deg)}
  }
</style>

      <span class="ko">웹 실험들의 모래밭 — 뭐든 끌어보고, 눌러서 들어가 보세요.</span>
    </p>
  </div>
</div>

<script>
(function(){
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var fine   = window.matchMedia && window.matchMedia('(pointer:fine)').matches;
  var stage  = document.getElementById('sbStage');
  var svg    = document.getElementById('sbDiorama');
  var trails = document.getElementById('sb-trails');

  /* ---- floating motes ---- */
  var motes = document.getElementById('sbMotes');
  if(motes && !reduce){
    for(var i=0;i<7;i++){
      var m=document.createElement('div'); m.className='sb-mote';
      m.style.left=(8+i*13)+'%'; m.style.top=(40+(i%4)*14)+'%';
      m.style.animationDelay=(i*1.9)+'s'; m.style.animationDuration=(11+i*1.3)+'s';
      motes.appendChild(m);
    }
  }
  /* ---- night stars ---- */
  var starBox=document.getElementById('sbStars');
  if(starBox){
    for(var s=0;s<26;s++){
      var st=document.createElement('div'); st.className='sb-star';
      st.style.left=(Math.round((s*37+13)%100))+'%';
      st.style.top=(Math.round((s*53+7)%62))+'%';
      st.style.animationDelay=((s%9)*0.4)+'s';
      st.style.opacity=(0.5+((s%5)*0.1));
      starBox.appendChild(st);
    }
  }

  /* ---- day / night toggle ---- */
  var toggle=document.getElementById('sbToggle');
  var saved=null; try{ saved=localStorage.getItem('sb-theme'); }catch(e){}
  if(saved==='night'){ stage.classList.add('night'); toggle.textContent='🌙'; }
  toggle.addEventListener('click', function(){
    var night=stage.classList.toggle('night');
    toggle.textContent=night?'🌙':'☀️';
    try{ localStorage.setItem('sb-theme', night?'night':'day'); }catch(e){}
  });

  /* ---- diorama parallax (fine pointer only) ---- */
  if(stage && !reduce && fine){
    var raf=null, tx=0, ty=0;
    stage.addEventListener('pointermove', function(e){
      if(window.__sbDragging) return;            /* don't fight a toy drag */
      var r=stage.getBoundingClientRect();
      tx=(e.clientX-r.left)/r.width-0.5; ty=(e.clientY-r.top)/r.height-0.5;
      if(!raf) raf=requestAnimationFrame(applyP);
    });
    stage.addEventListener('pointerleave', function(){ tx=0; ty=0; if(!raf) raf=requestAnimationFrame(applyP); });
    function applyP(){
      raf=null;
      svg.style.transform='rotateX('+(ty*-4).toFixed(2)+'deg) rotateY('+(tx*6).toFixed(2)+'deg) translate('+(tx*-14).toFixed(1)+'px,'+(ty*-9).toFixed(1)+'px)';
    }
  }

  /* ---- client coords -> svg user units (accounts for parallax/scale) ---- */
  function toSvg(clientX, clientY){
    var pt=svg.createSVGPoint(); pt.x=clientX; pt.y=clientY;
    var ctm=svg.getScreenCTM(); if(!ctm) return null;
    var p=pt.matrixTransform(ctm.inverse());
    return {x:p.x, y:p.y};
  }

  /* ---- sand divot (drag trail) ---- */
  var POOL=[], POOL_MAX=64;
  function stampDivot(x,y){
    var ns='http://www.w3.org/2000/svg';
    var g=document.createElementNS(ns,'g'); g.setAttribute('class','sb-divot');
    g.setAttribute('transform','translate('+x.toFixed(1)+','+y.toFixed(1)+')');
    var hollow=document.createElementNS(ns,'ellipse');
    hollow.setAttribute('rx',(8+Math.random()*4).toFixed(1)); hollow.setAttribute('ry',(4+Math.random()*2).toFixed(1));
    hollow.setAttribute('fill','#c5853f'); hollow.setAttribute('opacity','.55');
    var rim=document.createElementNS(ns,'ellipse');
    rim.setAttribute('rx','11'); rim.setAttribute('ry','5.5'); rim.setAttribute('cy','-1.5');
    rim.setAttribute('fill','none'); rim.setAttribute('stroke','#fff0c8'); rim.setAttribute('stroke-width','2'); rim.setAttribute('opacity','.5');
    g.appendChild(rim); g.appendChild(hollow);
    trails.appendChild(g);
    POOL.push(g);
    g.addEventListener('animationend', function(){ g.remove(); var k=POOL.indexOf(g); if(k>=0) POOL.splice(k,1); });
    while(POOL.length>POOL_MAX){ var old=POOL.shift(); if(old) old.remove(); }
  }

  /* ---- drag engine for toys ---- */
  /* clamp toys to roughly the sand area (scene user units) */
  var SAND={x0:460,x1:920,y0:380,y1:585};   /* drag-trails only stamp inside the sand */
  var BOUND={x0:-30,x1:1300,y0:180,y1:700}; /* nothing leaves the frame */
  var DX=300, DY=185;                        /* how far an item may roam from its home spot */
  var DRAG_THRESH=5;
  /* DRAG = whole container (.sb-item-pos). HOVER/CLICK/LABEL = per leaf part
     (.sb-item for simple toys, .sb-sub for parts inside a container like desk/bookshelf). */
  document.querySelectorAll('.sb-item-pos').forEach(function(pos){
    var startTx=0, startTy=0, startP=null, dragging=false, pid=null, last=null, rafD=null, pending=null, pressed=null;
    function curT(){ var m=/translate\(([-\d.]+),\s*([-\d.]+)\)/.exec(pos.getAttribute('transform')||''); return m?{x:+m[1],y:+m[2]}:{x:0,y:0}; }
    var home=curT();                           /* original spot — roam clamp is relative to it */
    var isSand=pos.dataset.sand==='1';
    function applyD(){
      rafD=null; if(!pending) return;
      var nx=Math.max(Math.max(BOUND.x0,home.x-DX), Math.min(Math.min(BOUND.x1,home.x+DX), pending.x));
      var ny=Math.max(Math.max(BOUND.y0,home.y-DY), Math.min(Math.min(BOUND.y1,home.y+DY), pending.y));
      pos.setAttribute('transform','translate('+nx.toFixed(1)+','+ny.toFixed(1)+')');
      if(dragging && !reduce && isSand && nx>SAND.x0 && nx<SAND.x1 && ny>SAND.y0 && ny<SAND.y1){
        if(!last || Math.hypot(nx-last.x,ny-last.y)>14){ stampDivot(nx, ny+2); last={x:nx,y:ny}; }
      }
    }
    pos.addEventListener('pointerdown', function(e){
      pressed = e.target.closest && e.target.closest('.sb-sub, .sb-item');  /* which leaf part was grabbed */
      pid=e.pointerId; var c=curT(); startTx=c.x; startTy=c.y;
      startP=toSvg(e.clientX,e.clientY); dragging=false; last=null;
      try{ pos.setPointerCapture(pid); }catch(_){}
    });
    pos.addEventListener('pointermove', function(e){
      if(pid===null || !startP) return;
      var p=toSvg(e.clientX,e.clientY); if(!p) return;
      var dx=p.x-startP.x, dy=p.y-startP.y;
      if(!dragging && Math.hypot(dx,dy)>DRAG_THRESH){ dragging=true; window.__sbDragging=true; if(pressed) pressed.classList.add('dragging'); }
      if(dragging){ pending={x:startTx+dx, y:startTy+dy}; if(!rafD) rafD=requestAnimationFrame(applyD); }
    });
    function end(){
      if(pid===null) return;
      try{ pos.releasePointerCapture(pid); }catch(_){}
      pid=null; startP=null;
      if(dragging){ if(pressed) pressed.classList.remove('dragging'); window.__sbDragging=false; }
    }
    pos.addEventListener('pointerup', function(e){
      var wasDrag=dragging; end();
      if(!wasDrag && pressed){ navLeaf(pressed, e, false); }   /* a click on a leaf, not a drag */
      else if(wasDrag){ e.preventDefault(); }
    });
    pos.addEventListener('pointercancel', end);
  });

  /* keyboard activation on each leaf part (anchors are tab-focusable) */
  document.querySelectorAll('.sb-sub, .sb-item').forEach(function(leaf){
    leaf.addEventListener('click', function(e){
      if(e.detail===0){ navLeaf(leaf, e, true); }   /* Enter/Space — no pointerup fired */
      else { e.preventDefault(); }                   /* pointer click already handled in pointerup */
    });
  });

  /* nav a leaf: soon → shake its label; live → go to href */
  function navLeaf(leaf, e, kb){
    if(leaf.classList.contains('sb-soon')){ if(e && e.preventDefault) e.preventDefault(); shake(leaf); return; }
    var h=leaf.getAttribute('href');
    if(kb){ if((!h || h==='#') && e) e.preventDefault(); /* else let native <a> navigate */ }
    else { if(h && h!=='#'){ window.location.href=h; } else if(e) e.preventDefault(); }
  }
  /* ---- soon-reject feedback (pops the part's signpost up + jiggles it) ---- */
  function shake(el){ var t=el.querySelector('.sb-tag'); if(!t) return; t.classList.remove('sb-shake'); requestAnimationFrame(function(){ requestAnimationFrame(function(){ t.classList.add('sb-shake'); }); }); }
})();
</script>
