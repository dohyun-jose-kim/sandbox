<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bottles · sandbox — dohyun-jose-kim</title>
<meta name="description" content="Bottles — a sandbox section under construction.">
<style>
  :root{
    --sky-0:#ff4d2e; --sky-1:#ff7a3d; --sky-2:#ffa969; --sky-3:#ffd2a0;
    --sun:#fff1cf;
    --sand-top:#ffe1a6; --sand-2:#f6c476; --sand-3:#e2a458; --sand-sh:#c5853f;
    --pink:#ff3d8b; --cream:#fff4e8; --ink:#5d2a14; --muted:#b06a2e;
    --font:"SF Pro Rounded", ui-rounded, "Quicksand", "Hiragino Maru Gothic Pro", system-ui, -apple-system, sans-serif;
  }
  .night{
    --sky-0:#10162e; --sky-1:#1d2547; --sky-2:#2c3460; --sky-3:#46406e;
    --sun:#cdd6ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font);
    background:linear-gradient(180deg,var(--sky-0) 0%,var(--sky-1) 34%,var(--sky-2) 62%,var(--sky-3) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden; text-align:center; color:var(--cream);
    transition:background .5s;
  }
  .glow{
    position:fixed; left:50%; top:26%; width:min(60vmin,420px); height:min(60vmin,420px);
    transform:translate(-50%,-50%); border-radius:50%;
    background:radial-gradient(circle, var(--sun) 0%, transparent 62%);
    opacity:.85; pointer-events:none;
  }
  main{position:relative; padding:24px}
  .emoji{font-size:clamp(64px,16vmin,120px); line-height:1; display:block; animation:bob 3.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1{
    margin:18px 0 8px; font-size:clamp(38px,9vmin,72px); font-weight:800; letter-spacing:.06em;
    text-transform:uppercase; text-shadow:0 3px 0 rgba(93,42,20,.25);
  }
  .msg{margin:0; font-size:clamp(14px,2.6vmin,18px); font-weight:700; opacity:.95}
  .msg small{display:block; margin-top:6px; font-weight:600; opacity:.85}
  .back{
    display:inline-block; margin-top:34px; padding:12px 22px; border-radius:999px;
    background:var(--cream); color:var(--ink); font-weight:800; font-size:15px;
    text-decoration:none; box-shadow:0 4px 0 rgba(93,42,20,.28);
    transition:transform .15s;
  }
  .back:hover{transform:translateY(-2px)}
  .sand{
    position:fixed; left:50%; bottom:-14vmin; width:150vmax; height:26vmin; min-height:150px;
    transform:translateX(-50%); border-radius:50% 50% 0 0 / 100% 100% 0 0;
    background:linear-gradient(180deg,var(--sand-top),var(--sand-2) 55%,var(--sand-3));
    box-shadow:inset 0 10px 24px rgba(197,133,63,.35);
  }
  @media (prefers-reduced-motion: reduce){ .emoji{animation:none} }
</style>
<div class="glow"></div>
<div class="sand"></div>
<main>
  <span class="emoji" aria-hidden="true">🍾</span>
  <h1>Bottles</h1>
  <p class="msg">under construction — still building this sandcastle
    <small>아직 모래성을 쌓는 중이에요</small>
  </p>
  <a class="back" href="../">← back to the sandbox</a>
</main>
<script>
  // follow the landing's day/night choice (same localStorage key)
  try{ if(localStorage.getItem('sb-theme')==='night') document.documentElement.classList.add('night'); }catch(e){}
</script>
